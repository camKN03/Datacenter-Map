  orbs.each(function(f){const s=sizeFor(f), g=d3.select(this), cy=-s*1.3; g.append('ellipse').attr('class','shadow').attr('cx',0).attr('cy',s*1.2).attr('rx',s*1.25).attr('ry',s*.42); g.append('circle').attr('class','ballGlow').attr('cx',0).attr('cy',cy).attr('r',s*1.9).style('animation-delay',(Math.random()*3)+'s'); g.append('circle').attr('class','focus').attr('cx',0).attr('cy',cy).attr('r',s*2.05); g.append('circle').attr('class','pulse').attr('cx',0).attr('cy',cy).attr('r',s*1.15).style('animation-delay',(Math.random()*3)+'s'); g.append('circle').attr('class','ball').attr('cx',0).attr('cy',cy).attr('r',s*.88); g.append('circle').attr('class','shine').attr('cx',-s*.27).attr('cy',cy-s*.28).attr('r',s*.24); g.append('circle').attr('r',12).attr('fill','transparent'); });
}
function rebuildCityLights(){cityLights=[]; const entries=FAC.filter(f=>bases.get(f.id)).map(f=>({id:f.id,b:bases.get(f.id)})); entries.forEach((a,i)=>{const nearby=entries.reduce((n,e,j)=> n + ((i!==j && Math.hypot(a.b[0]-e.b[0], a.b[1]-e.b[1])<74)?1:0), 0); const nLights=Math.min(26, 4 + Math.round(nearby*1.15)); const rand=mulberry32(hashCode(a.id)); for(let k=0;k<nLights;k++){const angle=rand()*Math.PI*2; const radius=(3 + Math.pow(rand(),.62)*(8 + nearby*3.4)); const dx=Math.cos(angle)*radius; const dy=Math.sin(angle)*(radius*.72); const tier = k%9===0 ? 'spark' : (k%3===0 ? 'bright' : 'soft'); cityLights.push({key:`${a.id}-${k}`, id:a.id, dx, dy, r: tier==='spark' ? .95 + rand()*.55 : tier==='bright' ? .7 + rand()*.45 : .45 + rand()*.35, o: tier==='spark' ? .95 : tier==='bright' ? .62 : .34, tier}); }});}
function drawCityLights(){lightLayer.selectAll('*').remove();}
function buildLinks(){linkLayer.selectAll('*').remove();}
function visible(f){if(!filters[f.phase]) return false; if(!q) return true; return (`${f.name} ${f.company} ${f.state} ${f.city} ${f.phaseLabel} ${f.category}`).toLowerCase().includes(q);}
function render(){let shown=0; FAC.forEach(f=>{const v=visible(f); if(v) shown++; const it=items.get(f.id); if(it) it.style.display=v?'':'none'; orbLayer.selectAll('.orb').filter(d=>d.id===f.id).classed('dimmed',!v); }); document.getElementById('listcount').textContent=`${shown} / ${FAC.length}`; let em=listEl.querySelector('.empty'); if(shown===0){if(!em){em=document.createElement('div'); em.className='empty'; em.textContent='No sites match. Adjust filters or search.'; listEl.appendChild(em);}} else if(em) em.remove(); drawCityLights(); buildLinks(); }
function buildList(){listEl.innerHTML=''; FAC.forEach(f=>{const row=document.createElement('div'); row.className='item'; row.dataset.id=f.id; row.innerHTML=`<span class="idot dot ${f.phase}"></span><span class="meta"><span class="nm">${f.name}</span><span class="co">${f.company||''}</span></span><span class="st">${f.state}</span>`; row.onclick=()=>select(f.id,!!bases.get(f.id)); listEl.appendChild(row); items.set(f.id,row);});}
function placeOrbs(){orbLayer.selectAll('.orb').attr('transform',f=>{const b=bases.get(f.id); if(!b) return 'translate(-9999,-9999)'; const p=curT.apply(b); return `translate(${p[0]},${p[1]})`;}); drawCityLights(); buildLinks();}
function flyTo(b,k){const t=d3.zoomIdentity.translate(W/2,H/2).scale(k).translate(-b[0],-b[1]); svg.transition().duration(600).call(zoom.transform,t);}
function openInspector(f){if(!inspector){inspector=document.createElement('div'); inspector.id='inspector'; document.getElementById('mapWrap').appendChild(inspector);} const fact=(k,v,full=false)=> v?`<div class="fact ${full?'full':''}"><span class="k">${k}</span><span class="v">${v}</span></div>`:''; inspector.innerHTML=`<button class="close" aria-label="Close">×</button><span class="badge ${f.phase}"><span class="d"></span>${f.phaseLabel||MAP[f.phase].label}</span><h2>${f.name}</h2><div class="company">${f.company||''}</div><div class="facts">${fact('Location', (f.city?f.city+', ':'')+f.state)}${fact('Status',f.status)}${fact('Planned capacity',f.capacity)}${fact('Investment',f.investment)}${fact('Timeline',f.timeline)}${fact('Category',f.category)}${fact('Notes',f.notes,true)}</div><div class="src">${f.source?`<a href="${f.source}" target="_blank" rel="noopener">Open source ↗</a><div class="srcnote">${new URL(f.source).hostname.replace('www.','')}</div>`:''}</div>`; inspector.querySelector('.close').onclick=()=>select(null,false); requestAnimationFrame(()=>inspector.classList.add('open')); document.getElementById('subline').textContent=`${f.name} — ${(f.city?f.city+', ':'')+f.state}`;}
function closeInspector(){if(inspector) inspector.classList.remove('open'); document.getElementById('subline').textContent='Select a node to inspect';}
function select(id,zoomTo){selId=id; orbLayer.selectAll('.orb').classed('selected',d=>d.id===id); items.forEach((el,k)=>el.classList.toggle('active',k===id)); if(!id){closeInspector(); return;} const f=FAC.find(x=>x.id===id); openInspector(f); const it=items.get(id); if(it) it.scrollIntoView({block:'nearest',behavior:'smooth'}); if(zoomTo){const b=bases.get(id); if(b) flyTo(b, Math.max(2.35, curT.k));}}
svg.on('click',()=>select(null,false));
async function init(){try{const us=await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json'); const geo=topojson.feature(us, us.objects.states); const nation=topojson.mesh(us, us.objects.states, (a,b)=>a===b); const graticule=d3.geoGraticule10(); drawOrbs(); buildList(); function layout(){const r=document.getElementById('mapWrap').getBoundingClientRect(); W=r.width; H=r.height; svg.attr('viewBox',`0 0 ${W} ${H}`); projection.fitExtent([[18,16],[W-18,H-16]], geo); bgLayer.selectAll('path.bg').data([geo]).join('path').attr('class','bg').attr('fill','transparent').attr('d',path); gratLayer.selectAll('path').data([graticule]).join('path').attr('class','grat').attr('d',path); statesLayer.selectAll('path').data(geo.features).join('path').attr('class','state').attr('d',path); nationLayer.selectAll('path').data([nation]).join('path').attr('class','nation').attr('d',path); bases.clear(); FAC.forEach(f=>{if(f.lat==null||f.lng==null) return; const p=projection([f.lng,f.lat]); if(p) bases.set(f.id,p); }); rebuildCityLights(); placeOrbs(); } layout(); render(); let rt; window.addEventListener('resize',()=>{clearTimeout(rt); rt=setTimeout(layout,130);}); } catch(err){document.getElementById('mapWrap').innerHTML='<div style="padding:28px;font-family:var(--mono);color:#ffb130">Map failed to load. Open in Chrome or Edge and make sure you are online.</div>'; console.error(err);} }
init();
</script>
